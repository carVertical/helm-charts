## configure service
service:
  enabled: true
  ## override the service name (default is release name or Values.fullnameOverride)
  name: {{ .Release.Name }}
  ## change type to NodePort if gce ingress (ClusterIP is better for Nginx ingress)
  # type: ClusterIP
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8002"
  labels:
    app: {{ .Release.Name }}
    # chart: {{ .Release.Chart }}
    release: {{ .Release.Name }}
  # loadBalancerIP: ""
  ##
  # clusterIP: ""
  # externalTrafficPolicy: Cluster
  ##
  ports: 
    - port: 8000
      targetPort: http
      name: http-inference-server
    - port: 8001
      targetPort: grpc
      name: grpc-inference-server
    - port: 8002
      targetPort: metrics
      name: metrics-inference-server
  ## if ports not defined, then .Values.ports will be used. If none defined, then http: 80
  ##
  ## https://kubernetes.io/docs/concepts/services-networking/service/#externalname
  # externalName: my.database.example.com
  ##
  # sessionAffinity: "ClientIP"
  selector:
    app: {{ .Release.Name }}
    release: {{ .Release.Name }}


## for extra services
extraServices:
  {{ .Release.Name }}-canary:
    name: {{ .Release.Name }}-canary
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8002"
    labels:
      app: {{ .Release.Name }}
    #   chart: {{ .Release.Chart }}
      release: {{ .Release.Name }}
    ports: 
      - port: 8000
        targetPort: http
        name: http-inference-server
      - port: 8001
        targetPort: grpc
        name: grpc-inference-server
      - port: 8002
        targetPort: metrics
        name: metrics-inference-server
    selector:
      app: {{ .Release.Name }}
      release: {{ .Release.Name }}

## ports for default container
ports:
  - containerPort: 8000
    name: http
  - containerPort: 8001
    name: grpc
  - containerPort: 8002
    name: metrics

