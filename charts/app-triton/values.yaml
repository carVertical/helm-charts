# Default values
schedulerName: kai-scheduler
runtimeClassName: nvidia

# resources:
#   requests:
#     cpu: "500m"
#     memory: "2Gi"
#     ephemeral-storage: "2Gi"
#   limits:
#     cpu: "500m"
#     memory: "2Gi"
#     ephemeral-storage: "2Gi"

httpRoute:
  enabled: true
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: main
    namespace: envoy-gateway-system
  hosts:
    - host: "serving.triton.ml.staging.carvertical.org"
      paths:
        - path: {{ .Values.triton.routes.PathPrefix }}
          servicePort: 8000
          filters:
            - type: URLRewrite
              urlRewrite:
                path:
                    type: ReplacePrefixMatch
                    replacePrefixMatch: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .Release.Name }}
          port: 8000
          weight: 1
        - group: ""
          kind: Service
          name: {{ .Release.Name }}-canary
          port: 8000
          weight: 1

grpcRoute:
  enabled: true
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: envoy-gateway-system
  hostnames:
    - "serving.triton.ml.staging.carvertical.org"
  rules:
  # - servicePort: 8001
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ .Release.Name }}
          port: 8001
          weight: 1
        - group: ""
          kind: Service
          name: {{ .Release.Name }}-canary
          port: 8001
          weight: 1

## set number of desired replics per environment (will be overriden if hpa is enabled (autoscaling))
replicas: 1

# namespace: default

## set repository in the defaults.yaml
image:
  ## has to be passed
  # repository: ""
  ## default imagePullPolicy is IfNotPresent, and if tag doesn't have a number(int) in it, then switched to Always
  # pullPolicy: IfNotPresent
  ## default tag, pipeline should add latest tag when pushing to production
  ## tag will be passed automatically through pipeline
    repository: {{ .Values.awsAccountId }}.dkr.ecr.eu-central-1.amazonaws.com/ml-triton
    tag: {{ .Values.tritonSpecNormalizerSkoda.imageTag }}

## secret name for dockerconfigjson secret
# imagePullSecrets:
#   - name: image-pull-secret

## you can override the name of your deployment, which will manifest in naming conventions of deployment
# fullnameOverride: ""

## you can override the name of your main container
# nameOverride: ""

## main labels (overrides default helm labels)
# labels:
#   key: value

## pod level labels
podLabels:
    app: {{ .Release.Name }}
    kai.scheduler/queue: test
    release: {{ .Release.Name }}

## override main selector labels
# selectorLabels:
#   app: app-blue

## add labels to deployment metadata
# labelsDeployment:
#   key: value

## annotation: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
annotations: {}

## add extra annotations to pod metadata
podAnnotations:
    gpu-memory: "2000"
    kai.scheduler/unschedulableTimeoutSeconds: "300"

## default update strategy if HorizontalPodAutoscaler (autoscaling) is not enabled
## .Values.argo.rollouts.strategy will take priority
## ref: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#strategy
strategy: {}
